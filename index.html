<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MR MUSIC</title>
  
  <style>
    /* --- MUKAMMAL DINAMIK O'ZGARUVCHILAR --- */
    :root {
      --spotify-green: #1DB954; 
      --ios-red: #ff3b30; 
      
      /* Kunduzgi rejim (Light) */
      --bg: #ffffff;
      --text-main: #000000; 
      --text-sec: #8e8e93; 
      --wave-color: #47c1b1;
      --bg-soft: #f2f2f7;
      --border-color: #e5e5ea;
      --nav-bg: rgba(255, 255, 255, 0.85);
      --toast-bg: rgba(255, 255, 255, 0.95);
      --toast-text: #000000;
      --progress-bg: #eeeeee;
      --icon-fill: #000000;
      --theme-btn-border: #e5e5ea;
    }

    body.dark-theme {
      /* Tungi rejim (Dark) */
      --bg: #000000;
      --text-main: #ffffff;
      --text-sec: #a1a1a6;
      --wave-color: #3aa89a;
      --bg-soft: #1c1c1e;
      --border-color: #2c2c2e;
      --nav-bg: rgba(0, 0, 0, 0.85);
      --toast-bg: rgba(30, 30, 30, 0.95);
      --toast-text: #ffffff;
      --progress-bg: #333333;
      --icon-fill: #ffffff;
      --theme-btn-border: #333333;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      outline: none; 
    }

    body { 
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding-bottom: 150px; 
      color: var(--text-main); 
      overflow-x: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    .container { 
      max-width: 500px; 
      margin: 0 auto; 
      padding: 20px; 
    }

    .header-title { 
      font-size: 34px; 
      font-weight: 800; 
      margin-bottom: 25px; 
      letter-spacing: -1px; 
    }

    [id^="time-"] {
      font-size: 12px;
      color: var(--text-sec);
      text-align: right;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums; 
      font-weight: 500;
      transition: transform 0.2s ease, color 0.4s ease;
      display: block;
    }

    .time-update {
      animation: timePop 0.3s ease-out;
    }

    @keyframes timePop {
      0% { opacity: 0.7; transform: translateY(2px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    #up-bar { 
      position: fixed; 
      top: 0; 
      left: 0; 
      height: 4px; 
      background: var(--spotify-green); 
      width: 0%; 
      z-index: 3000; 
      transition: width 0.3s ease; 
    }

    #up-txt { 
      position: fixed; 
      top: 10px; 
      right: 15px; 
      background: var(--toast-bg); 
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--toast-text); 
      font-size: 12px; 
      font-weight: 600;
      padding: 8px 16px; 
      border-radius: 20px; 
      border: 1px solid var(--border-color);
      display: none; 
      z-index: 3000; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    .audio-card { 
      margin-bottom: 40px; 
      border-bottom: 1px solid var(--border-color); 
      padding-bottom: 20px; 
      transition: border-color 0.4s ease, background-color 0.4s ease, padding 0.4s ease, border-radius 0.4s ease, box-shadow 0.4s ease;
    }

    .audio-card:target {
      background: var(--bg-soft);
      padding: 15px;
      border-radius: 16px;
      border-bottom-color: transparent;
      box-shadow: 0 0 20px rgba(29, 185, 84, 0.15);
    }

    .card-meta h4 { 
      margin: 0; 
      font-size: 19px; 
      font-weight: 700;
    }

    .card-meta p { 
      margin: 4px 0; 
      color: var(--text-sec); 
      font-size: 13px; 
      transition: color 0.4s ease;
    }

    .waveform-visualizer { 
      width: 100%; 
      height: 70px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      gap: 2.5px; 
      margin: 20px 0; 
    }

    .w-bar { 
      flex: 1; 
      border-radius: 10px; 
      height: 6px; 
      background: var(--border-color); 
      transition: height 0.1s ease, background-color 0.4s ease; 
    }

    .w-bar.active { background: var(--wave-color); }

    .progress-box { 
      position: relative; 
      width: 100%; 
      height: 6px; 
      background: var(--progress-bg); 
      border-radius: 3px; 
      margin-bottom: 25px; 
      cursor: pointer; 
      transition: background-color 0.4s ease;
    }

    .progress-fill { 
      height: 100%; 
      background: var(--spotify-green); 
      width: 0%; 
      border-radius: 3px; 
      position: relative; 
    }

    .progress-fill::after { 
      content: ''; 
      position: absolute; 
      right: -7px; 
      top: -5px; 
      width: 16px; 
      height: 16px; 
      background: #fff; 
      border: 3px solid var(--spotify-green); 
      border-radius: 50%; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .controls { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 25px; 
    }

    .btn-svg { 
      background: none; 
      border: none; 
      cursor: pointer; 
      padding: 10px; 
      display: flex; 
      align-items: center; 
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      position: relative;
    }

    .btn-svg:active { opacity: 0.6; transform: scale(0.85); }

    .btn-play { 
      width: 65px; 
      height: 65px; 
      border: 2.5px solid var(--icon-fill); 
      border-radius: 50%; 
      justify-content: center; 
      transition: border-color 0.4s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .svg-icon { 
      width: 26px; 
      height: 26px; 
      fill: var(--icon-fill); 
      z-index: 2;
      transition: fill 0.4s ease;
    }

    .btn-svg.loop-active .svg-icon { fill: var(--spotify-green); }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    .loading-spinner {
      position: absolute; 
      top: -2.5px; left: -2.5px; right: -2.5px; bottom: -2.5px;
      border: 3px solid transparent; 
      border-top-color: var(--spotify-green); 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
      z-index: 1;
    }

    .studio-box { text-align: center; padding: 30px 0; }

    .timer { 
      font-size: 64px; 
      font-weight: 200; 
      margin: 15px 0; 
      font-variant-numeric: tabular-nums; 
      letter-spacing: -2px;
    }

    .studio-viz { 
      height: 80px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 4px; 
      margin-bottom: 30px; 
    }

    .s-bar { 
      width: 5px; 
      border-radius: 3px; 
      background: var(--progress-bg); 
      transition: height 0.08s ease, background-color 0.4s ease; 
    }

    .ios-input { 
      width: 100%; 
      padding: 18px; 
      background: var(--bg-soft); 
      border: none; 
      border-radius: 16px; 
      font-size: 17px; 
      margin-bottom: 15px; 
      color: var(--text-main);
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    .ios-input::placeholder {
      color: var(--text-sec);
    }

    .nav-bar { 
      position: fixed; 
      bottom: 0; left: 0; right: 0; 
      background: var(--nav-bg); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      display: flex; 
      padding: 12px 0 35px; 
      border-top: 1px solid var(--border-color); 
      z-index: 1000; 
      transition: background-color 0.4s ease, border-color 0.4s ease;
    }

    .nav-item { 
      flex: 1; 
      text-align: center; 
      border: none; 
      background: none; 
      color: var(--text-sec); 
      font-size: 11px; 
      font-weight: 600; 
      transition: color 0.3s ease;
    }

    .nav-item.active { color: var(--spotify-green); }

    .nav-item svg { 
      display: block; 
      margin: 0 auto 6px; 
      fill: currentColor; 
      width: 24px; 
      height: 24px; 
    }

    .page { display: none; }
    .page.active { 
      display: block; 
      animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    #theme-toggle {
      border: 1px solid var(--theme-btn-border); 
      border-radius: 50%; 
      padding: 8px; 
      width: 45px; 
      height: 45px; 
      justify-content: center;
      transition: border-color 0.4s ease, transform 0.2s;
    }

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
  </style>
</head>
<body>

<script type="module">
    // ========== MUSIQA PLAYER MODULE ==========
    // Bu kod musiqa tugaganda, agar takrorlash rejimi yoqilmagan bo'lsa,
    // avtomatik ravishda random keyingi musiqaga o'tadi
    
    class MusicPlayer {
        constructor() {
            this.playlist = [];
            this.currentTrackIndex = 0;
            this.isPlaying = false;
            this.isRepeat = false;      // Takrorlash rejimi (default: false)
            this.isShuffle = false;      // Random rejimi
            this.audio = new Audio();
            this.currentTime = 0;
            this._lastTrackIndex = -1;
            
            this.initEventListeners();
        }
        
        initEventListeners() {
            // Musiqa tugaganda
            this.audio.addEventListener('ended', () => {
                console.log('[Player] Musiqa tugadi');
                
                if (!this.isRepeat) {
                    // Takrorlash rejimi YO'Q => random keyingi musiqa
                    this.playNextRandom();
                } else {
                    // Takrorlash rejimi YOQILGAN => xuddi shu musiqani takrorla
                    this.playCurrentTrack();
                }
            });
            
            // Xatolik bo'lsa ham random keyingi musiqaga o'tish
            this.audio.addEventListener('error', (e) => {
                console.error('[Player] Musiqa xatosi:', e);
                this.playNextRandom();
            });
            
            // Vaqt yangilanganda
            this.audio.addEventListener('timeupdate', () => {
                if (this.onTimeUpdate) {
                    this.onTimeUpdate(this.audio.currentTime, this.audio.duration);
                }
            });
        }
        
        // Playlistni o'rnatish
        setPlaylist(songs) {
            if (!Array.isArray(songs)) return;
            this.playlist = songs;
            console.log(`[Player] Playlist yangilandi: ${this.playlist.length} ta musiqa`);
            if (this.onPlaylistUpdate) {
                this.onPlaylistUpdate(this.playlist);
            }
        }
        
        // Musiqa qo'shish
        addTrack(track) {
            if (!track || !track.url) return;
            this.playlist.push(track);
            console.log(`[Player] Yangi musiqa qo'shildi: ${track.title}`);
            if (this.onPlaylistUpdate) {
                this.onPlaylistUpdate(this.playlist);
            }
        }
        
        // Random keyingi musiqaga o'tish (asosiy funksiya)
        playNextRandom() {
            if (this.playlist.length === 0) {
                console.warn('[Player] Playlist bo\'sh');
                return;
            }
            
            let nextIndex;
            
            if (this.isShuffle) {
                // Random rejimi yoqilgan: butunlay random
                do {
                    nextIndex = Math.floor(Math.random() * this.playlist.length);
                } while (nextIndex === this.currentTrackIndex && this.playlist.length > 1);
            } else {
                // Random rejimi yo'q: hozirgi musiqadan boshqa random
                if (this.playlist.length === 1) {
                    nextIndex = 0;
                } else {
                    nextIndex = Math.floor(Math.random() * (this.playlist.length - 1));
                    if (nextIndex >= this.currentTrackIndex) nextIndex++;
                }
            }
            
            this.currentTrackIndex = nextIndex;
            this.playCurrentTrack();
            
            const track = this.playlist[this.currentTrackIndex];
            console.log(`[Player] Random keyingi musiqa: ${track?.title || 'Noma\'lum'}`);
        }
        
        // Keyingi musiqaga o'tish
        playNext() {
            if (this.playlist.length === 0) return;
            
            if (this.isShuffle) {
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * this.playlist.length);
                } while (nextIndex === this.currentTrackIndex && this.playlist.length > 1);
                this.currentTrackIndex = nextIndex;
            } else {
                this.currentTrackIndex = (this.currentTrackIndex + 1) % this.playlist.length;
            }
            
            this.playCurrentTrack();
        }
        
        // Oldingi musiqaga o'tish
        playPrevious() {
            if (this.playlist.length === 0) return;
            
            if (this.isShuffle) {
                let prevIndex;
                do {
                    prevIndex = Math.floor(Math.random() * this.playlist.length);
                } while (prevIndex === this.currentTrackIndex && this.playlist.length > 1);
                this.currentTrackIndex = prevIndex;
            } else {
                this.currentTrackIndex = (this.currentTrackIndex - 1 + this.playlist.length) % this.playlist.length;
            }
            
            this.playCurrentTrack();
        }
        
        // Hozirgi musiqani o'ynatish
        playCurrentTrack() {
            if (this.playlist.length === 0) {
                console.warn('[Player] Playlist bo\'sh');
                return;
            }
            
            const track = this.playlist[this.currentTrackIndex];
            if (!track || !track.url) {
                console.error('[Player] Musiqa URL topilmadi');
                this.playNextRandom();
                return;
            }
            
            this._lastTrackIndex = this.currentTrackIndex;
            this.audio.src = track.url;
            this.audio.load();
            
            if (this.currentTime > 0 && this.currentTrackIndex === this._lastTrackIndex) {
                this.audio.currentTime = this.currentTime;
            } else {
                this.currentTime = 0;
            }
            
            this.audio.play().catch(e => {
                console.error('[Player] Musiqa o\'ynatilmadi:', e);
            });
            
            this.isPlaying = true;
            
            if (this.onTrackChange) {
                this.onTrackChange(track, this.currentTrackIndex);
            }
            if (this.onPlayStateChange) {
                this.onPlayStateChange(true);
            }
            
            console.log(`[Player] ▶️ O'ynatilmoqda: ${track.title} - ${track.artist || 'Noma\'lum'}`);
        }
        
        // To'xtatish
        pause() {
            this.audio.pause();
            this.isPlaying = false;
            if (this.onPlayStateChange) {
                this.onPlayStateChange(false);
            }
        }
        
        // Davom ettirish
        play() {
            this.audio.play();
            this.isPlaying = true;
            if (this.onPlayStateChange) {
                this.onPlayStateChange(true);
            }
        }
        
        // Play/Pause
        togglePlay() {
            if (this.isPlaying) {
                this.pause();
            } else {
                this.play();
            }
        }
        
        // Ovoz balandligi (0-1)
        setVolume(volume) {
            const vol = Math.max(0, Math.min(1, volume));
            this.audio.volume = vol;
            if (this.onVolumeChange) {
                this.onVolumeChange(vol);
            }
        }
        
        // Vaqtni o'zgartirish
        seekTo(time) {
            if (time >= 0 && time <= this.audio.duration) {
                this.audio.currentTime = time;
                this.currentTime = time;
            }
        }
        
        // Takrorlash rejimini o'zgartirish
        toggleRepeat() {
            this.isRepeat = !this.isRepeat;
            console.log(`[Player] Takrorlash rejimi: ${this.isRepeat ? 'YOQILDI' : 'O\'CHIRILDI'}`);
            if (this.onRepeatChange) {
                this.onRepeatChange(this.isRepeat);
            }
            return this.isRepeat;
        }
        
        // Random rejimini o'zgartirish
        toggleShuffle() {
            this.isShuffle = !this.isShuffle;
            console.log(`[Player] Random rejimi: ${this.isShuffle ? 'YOQILDI' : 'O\'CHIRILDI'}`);
            if (this.onShuffleChange) {
                this.onShuffleChange(this.isShuffle);
            }
            return this.isShuffle;
        }
        
        // Hozirgi musiqani olish
        getCurrentTrack() {
            return this.playlist[this.currentTrackIndex] || null;
        }
        
        // Playlistni tozalash
        clearPlaylist() {
            this.playlist = [];
            this.currentTrackIndex = 0;
            this.audio.pause();
            this.audio.src = '';
            this.isPlaying = false;
            console.log('[Player] Playlist tozalandi');
            if (this.onPlaylistUpdate) {
                this.onPlaylistUpdate(this.playlist);
            }
        }
        
        // Callback funksiyalar
        onTrackChange(callback) { this.onTrackChange = callback; }
        onTimeUpdate(callback) { this.onTimeUpdate = callback; }
        onPlayStateChange(callback) { this.onPlayStateChange = callback; }
        onVolumeChange(callback) { this.onVolumeChange = callback; }
        onRepeatChange(callback) { this.onRepeatChange = callback; }
        onShuffleChange(callback) { this.onShuffleChange = callback; }
        onPlaylistUpdate(callback) { this.onPlaylistUpdate = callback; }
    }
    
    // ========== PLAYER OBYEKTINI YARATISH ==========
    const player = new MusicPlayer();
    
    // ========== MISOL: PLAYLIST (O'Z MUSIQALARINGIZ BILAN ALMASHTIRING) ==========
    const examplePlaylist = [
        { id: 1, title: "Musiqa 1", artist: "Artist 1", url: "https://example.com/music1.mp3", duration: 180 },
        { id: 2, title: "Musiqa 2", artist: "Artist 2", url: "https://example.com/music2.mp3", duration: 210 },
        { id: 3, title: "Musiqa 3", artist: "Artist 3", url: "https://example.com/music3.mp3", duration: 195 },
        { id: 4, title: "Musiqa 4", artist: "Artist 4", url: "https://example.com/music4.mp3", duration: 225 },
    ];
    
    // Playlistni o'rnatish
    player.setPlaylist(examplePlaylist);
    
    // ========== UI CALLBACKLAR (O'Z UI ELEMENTLARINGIZGA MOSLANG) ==========
    player.onTrackChange((track, index) => {
        console.log(`🎵 Endi: ${track.title} (${index + 1}/${player.playlist.length})`);
        // UI yangilash:
        // const titleEl = document.getElementById('current-song-title');
        // if (titleEl) titleEl.textContent = track.title;
        // const artistEl = document.getElementById('current-song-artist');
        // if (artistEl) artistEl.textContent = track.artist || '';
    });
    
    player.onTimeUpdate((currentTime, duration) => {
        const progressPercent = duration ? (currentTime / duration) * 100 : 0;
        // Progress barni yangilash:
        // const progressBar = document.getElementById('progress-bar-fill');
        // if (progressBar) progressBar.style.width = `${progressPercent}%`;
        // const currentTimeEl = document.getElementById('current-time');
        // if (currentTimeEl) currentTimeEl.textContent = formatTime(currentTime);
        // const durationEl = document.getElementById('duration');
        // if (durationEl) durationEl.textContent = formatTime(duration);
    });
    
    player.onPlayStateChange((isPlaying) => {
        console.log(`Player state: ${isPlaying ? '▶️ O\'ynatilmoqda' : '⏸ To\'xtatilgan'}`);
        // Play/Pause tugmasini yangilash:
        // const playBtn = document.getElementById('play-pause-btn');
        // if (playBtn) playBtn.innerHTML = isPlaying ? '⏸' : '▶';
    });
    
    player.onRepeatChange((isRepeat) => {
        console.log(`Repeat mode: ${isRepeat ? 'ON' : 'OFF'}`);
        // Repeat tugmasini yangilash:
        // const repeatBtn = document.getElementById('repeat-btn');
        // if (repeatBtn) repeatBtn.classList.toggle('active', isRepeat);
    });
    
    player.onShuffleChange((isShuffle) => {
        console.log(`Shuffle mode: ${isShuffle ? 'ON' : 'OFF'}`);
        // Shuffle tugmasini yangilash:
        // const shuffleBtn = document.getElementById('shuffle-btn');
        // if (shuffleBtn) shuffleBtn.classList.toggle('active', isShuffle);
    });
    
    // Vaqtni formatlash uchun yordamchi funksiya
    function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // ========== PLAYERNI GLOBAL QILISH (ixtiyoriy) ==========
    window.musicPlayer = player;
    window.formatTime = formatTime;
    
    // ========== TUGMALAR UCHUN EVENT LISTENERLAR (O'Z TUGMALARINGIZGA MOSLANG) ==========
    // Agar sahifangizda tugmalar mavjud bo'lsa, ularni shu yerda bog'lang:
    /*
    document.getElementById('play-pause-btn')?.addEventListener('click', () => player.togglePlay());
    document.getElementById('next-btn')?.addEventListener('click', () => player.playNext());
    document.getElementById('prev-btn')?.addEventListener('click', () => player.playPrevious());
    document.getElementById('repeat-btn')?.addEventListener('click', () => player.toggleRepeat());
    document.getElementById('shuffle-btn')?.addEventListener('click', () => player.toggleShuffle());
    document.getElementById('volume-slider')?.addEventListener('input', (e) => player.setVolume(e.target.value / 100));
    document.getElementById('progress-bar')?.addEventListener('click', (e) => {
        const progressBar = e.currentTarget;
        const rect = progressBar.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percent = clickX / rect.width;
        const duration = player.audio.duration;
        if (duration) player.seekTo(percent * duration);
    });
    */
    
    // Musiqani random boshlash (agar playlist bo'sh bo'lmasa)
    if (player.playlist.length > 0) {
        // Random boshlash uchun:
        const randomIndex = Math.floor(Math.random() * player.playlist.length);
        player.currentTrackIndex = randomIndex;
        // player.playCurrentTrack();  // Agar avtomatik o'ynasin desangiz
    }
    
    console.log('🎵 Music Player module loaded successfully!');
    console.log('💡 Asosiy xususiyat: Musiqa tugaganda random keyingi musiqaga o\'tish (agar takrorlash rejimi yoqilmagan bo\'lsa)');
</script>
