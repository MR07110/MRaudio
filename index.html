<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MR BOARD · Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-base: #ffffff;
            --bg-alt: #f8fafc;
            --bg-glass: rgba(255,255,255,0.65);
            --bg-panel: rgba(255,255,255,0.85);
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: #e2e8f0;
            --border-strong: rgba(0,0,0,0.05);
            --brand-primary: #007aff;
            --brand-primary-dark: #0056b3;
            --brand-alpha: rgba(0,122,255,0.1);
            --state-danger: #ff3b30;
            --state-success: #34c759;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 24px 48px -12px rgba(0,0,0,0.15);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-fast: 0.2s;
            --transition-normal: 0.3s;
        }

        [data-theme="dark"] {
            --bg-base: #020617;
            --bg-alt: #0f172a;
            --bg-glass: rgba(15,23,42,0.65);
            --bg-panel: rgba(15,23,42,0.85);
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-subtle: rgba(255,255,255,0.1);
            --border-strong: rgba(255,255,255,0.05);
            --brand-primary: #0a84ff;
            --brand-primary-dark: #007aff;
            --brand-alpha: rgba(10,132,255,0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-alt);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-main);
        }
        .logo span { color: var(--brand-primary); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-container { position: relative; }
        .search-input {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 8px 16px 8px 40px;
            font-size: 14px;
            width: 220px;
            color: var(--text-main);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--brand-primary);
            width: 280px;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .theme-toggle {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-toggle:hover { background: var(--brand-alpha); }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--brand-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .user-name { font-weight: 600; font-size: 14px; }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        .welcome-card {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-dark) 100%);
            border-radius: 28px;
            padding: 24px;
            color: white;
            margin-bottom: 24px;
        }
        .welcome-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .welcome-card p { font-size: 14px; opacity: 0.9; }

        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .quick-action {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-main);
        }
        .quick-action:hover { transform: translateY(-2px); border-color: var(--brand-primary); }
        .quick-action.create { background: var(--brand-primary); color: white; border: none; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 16px;
        }
        .section-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .refresh-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        .refresh-btn:hover { background: var(--brand-alpha); color: var(--brand-primary); transform: rotate(180deg); }

        .rooms-container {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            padding-right: 4px;
        }
        .rooms-container::-webkit-scrollbar { width: 4px; }
        .rooms-container::-webkit-scrollbar-track { background: var(--border-strong); border-radius: 10px; }
        .rooms-container::-webkit-scrollbar-thumb { background: var(--brand-primary); border-radius: 10px; }

        .rooms-grid { display: flex; flex-direction: column; gap: 16px; }

        .room-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            transition: all var(--transition-normal);
            border: 1px solid var(--border-subtle);
        }
        .room-card:hover { transform: translateY(-2px); border-color: var(--brand-primary); box-shadow: var(--shadow-md); }

        .room-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }
        .room-name { font-size: 16px; font-weight: 700; }
        .room-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--brand-alpha);
            color: var(--brand-primary);
        }
        .room-badge.active { background: rgba(52,199,89,0.15); color: var(--state-success); }
        .room-badge.private { background: rgba(255,59,48,0.1); color: var(--state-danger); }

        .creator-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .creator-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--brand-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }
        .creator-name { font-size: 12px; font-weight: 600; cursor: pointer; }
        .creator-name:hover { color: var(--brand-primary); }

        .room-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .room-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .room-btn {
            flex: 1;
            padding: 10px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all var(--transition-fast);
        }
        .room-join-btn { background: var(--brand-primary); color: white; border: none; }
        .room-join-btn:hover { background: var(--brand-primary-dark); transform: translateY(-2px); }
        .room-edit-btn { background: var(--bg-alt); border: 1px solid var(--border-subtle); color: var(--text-main); }
        .room-edit-btn:hover { background: var(--brand-alpha); border-color: var(--brand-primary); }
        .room-delete-btn { background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.2); color: var(--state-danger); }
        .room-delete-btn:hover { background: rgba(255,59,48,0.2); transform: translateY(-2px); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-subtle);
        }

        /* Bottom Tab Bar */
        .bottom-tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px 20px;
            z-index: 100;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .tab-item i { font-size: 24px; }
        .tab-item.active { color: var(--brand-primary); background: var(--brand-alpha); }

        /* Profile Modal */
        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }
        .profile-modal.active { opacity: 1; visibility: visible; }
        .profile-modal-content {
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            transform: scale(0.9);
            transition: transform var(--transition-normal) var(--ease-spring);
            border: 1px solid var(--border-subtle);
        }
        .profile-modal.active .profile-modal-content { transform: scale(1); }
        .modal-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--brand-primary);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: 800;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        .modal-avatar:hover { transform: scale(1.05); }
        .modal-fullname { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
        .modal-username { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .modal-bio { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        .modal-close {
            background: var(--brand-primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Large Avatar Modal */
        .avatar-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
            cursor: pointer;
        }
        .avatar-modal.active { opacity: 1; visibility: visible; }
        .large-avatar {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 32px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.3);
        }

        /* Edit Room Modal */
        .edit-room-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 28px 28px 0 0;
            padding: 24px;
            z-index: 250;
            transform: translateY(100%);
            transition: transform var(--transition-normal) var(--ease-spring);
        }
        .edit-room-modal.active { transform: translateY(0); }

        /* Profile Section */
        .profile-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--brand-primary);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: 800;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }
        .profile-field { margin-bottom: 20px; text-align: left; }
        .profile-field label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 6px; }
        .profile-field input, .profile-field textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-alt);
            border: 1px solid var(--border-strong);
            border-radius: 16px;
            font-size: 15px;
            color: var(--text-main);
        }
        .profile-field input:focus, .profile-field textarea:focus {
            border-color: var(--brand-primary);
            outline: none;
        }
        .profile-actions { display: flex; gap: 12px; margin-top: 24px; }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-radius: 28px 28px 0 0;
            padding: 24px;
            z-index: 201;
            transform: translateY(100%);
            transition: transform var(--transition-normal) var(--ease-spring);
        }
        .modal.active { transform: translateY(0); }
        .modal-header { font-size: 20px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-base);
            border: 2px solid var(--border-strong);
            border-radius: 20px;
            font-size: 15px;
        }
        .form-input:focus { border-color: var(--brand-primary); outline: none; }
        .room-type-selector { display: flex; gap: 12px; margin-top: 8px; }
        .type-btn {
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            background: var(--bg-base);
            border: 1px solid var(--border-strong);
            font-weight: 600;
            cursor: pointer;
        }
        .type-btn.active { background: var(--brand-alpha); border-color: var(--brand-primary); color: var(--brand-primary); }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn-primary { background: var(--brand-primary); color: white; border: none; }
        .btn-ghost { background: var(--bg-base); border: 1px solid var(--border-strong); color: var(--text-main); }

        .section-page { display: none; }
        .section-page.active { display: block; }

        .toast-wrapper {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast-item {
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s var(--ease-spring);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 768px) {
            .search-input { width: 140px; }
            .search-input:focus { width: 180px; }
            .user-name { display: none; }
            .room-actions { flex-direction: column; }
            .rooms-container { max-height: calc(100vh - 320px); }
        }
    </style>
</head>
<body>

    <div class="toast-wrapper" id="toastWrapper"></div>

    <div class="header">
        <a href="index.html" class="logo"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--brand-primary)" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>MR <span>BOARD</span></a>
        <div class="header-actions">
            <div class="search-container"><i data-lucide="search" size="16" class="search-icon"></i><input type="text" id="searchInput" class="search-input" placeholder="Xona yoki foydalanuvchi..."></div>
            <button class="theme-toggle" id="themeToggle"><i data-lucide="sun" id="themeIcon"></i><span id="themeText">Light</span></button>
            <div class="user-info" id="currentUserInfo"><span class="user-name" id="userName"></span><div class="user-avatar" id="userAvatar"></div></div>
        </div>
    </div>

    <div class="main-content">
        <!-- Home Section -->
        <div class="section-page active" id="homeSection">
            <div class="welcome-card"><h1 id="welcomeMessage">Assalomu alaykum!</h1><p>Birgalikda ishlashni boshlang</p></div>
            <div class="quick-actions"><button class="quick-action create" id="quickCreateBtn"><i data-lucide="plus-circle"></i> Yangi xona</button><button class="quick-action" id="quickJoinBtn"><i data-lucide="log-in"></i> Kod bilan kirish</button></div>
            <div class="section-header"><h2 class="section-title">📋 Barcha xonalar</h2><button class="refresh-btn" id="refreshRoomsBtn"><i data-lucide="refresh-cw"></i></button></div>
            <div class="rooms-container"><div id="roomsList" class="rooms-grid"><div class="empty-state">Yuklanmoqda...</div></div></div>
        </div>

        <!-- My Rooms Section -->
        <div class="section-page" id="myRoomsSection">
            <div class="section-header"><h2 class="section-title">⭐ Mening xonalarim</h2><button class="refresh-btn" id="refreshMyRoomsBtn"><i data-lucide="refresh-cw"></i></button></div>
            <div class="rooms-container"><div id="myRoomsList" class="rooms-grid"><div class="empty-state">Yuklanmoqda...</div></div></div>
        </div>

        <!-- Profile Section -->
        <div class="section-page" id="profileSection">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()"><span id="avatarText">U</span></div>
                <input type="file" id="avatarInput" style="display: none;" accept="image/*">
                <div class="profile-field"><label>Ism</label><input type="text" id="profileFullname" placeholder="Ismingiz"></div>
                <div class="profile-field"><label>Familiya</label><input type="text" id="profileLastname" placeholder="Familiyangiz"></div>
                <div class="profile-field"><label>Username</label><input type="text" id="profileUsername" placeholder="username"></div>
                <div class="profile-field"><label>Email</label><input type="email" id="profileEmail" disabled style="background: var(--bg-alt);"></div>
                <div class="profile-field"><label>Bio</label><textarea id="profileBio" rows="3" placeholder="O'zingiz haqingizda..."></textarea></div>
                <div class="profile-actions"><button class="btn btn-primary" id="saveProfileBtn">💾 Saqlash</button><button class="btn btn-ghost" id="logoutBtn">🚪 Chiqish</button></div>
            </div>
        </div>
    </div>

    <div class="bottom-tab-bar">
        <button class="tab-item active" data-tab="home"><i data-lucide="home"></i><span>Bosh sahifa</span></button>
        <button class="tab-item" data-tab="myrooms"><i data-lucide="star"></i><span>Mening xonalar</span></button>
        <button class="tab-item" data-tab="profile"><i data-lucide="user"></i><span>Profil</span></button>
    </div>

    <!-- User Profile Modal -->
    <div class="profile-modal" id="userProfileModal">
        <div class="profile-modal-content">
            <div class="modal-avatar" id="modalAvatar" onclick="showLargeAvatar()"><span id="modalAvatarText">U</span></div>
            <div class="modal-fullname" id="modalFullname"></div>
            <div class="modal-username" id="modalUsername"></div>
            <div class="modal-bio" id="modalBio"></div>
            <button class="modal-close" onclick="closeUserProfile()">Yopish</button>
        </div>
    </div>

    <!-- Large Avatar Modal -->
    <div class="avatar-modal" id="avatarModal" onclick="closeLargeAvatar()">
        <img class="large-avatar" id="largeAvatarImg" src="" alt="Avatar">
    </div>

    <!-- Edit Room Modal -->
    <div class="edit-room-modal" id="editRoomModal">
        <div class="modal-header">✏️ Xonani tahrirlash</div>
        <div class="form-group"><label>Xona nomi</label><input type="text" id="editRoomName" class="form-input" placeholder="Xona nomi"></div>
        <div class="form-group"><label>Xona turi</label><div class="room-type-selector"><button class="type-btn" data-type="public" id="editPublicBtn">🌍 Public</button><button class="type-btn" data-type="private" id="editPrivateBtn">🔒 Private</button></div></div>

   <script type="module">
    // ========== MUSIQA PLAYER MODULE ==========
    // Bu kod musiqa tugaganda, agar takrorlash rejimi yoqilmagan bo'lsa,
    // avtomatik ravishda random keyingi musiqaga o'tadi
    
    class MusicPlayer {
        constructor() {
            this.playlist = [];
            this.currentTrackIndex = 0;
            this.isPlaying = false;
            this.isRepeat = false;      // Takrorlash rejimi (default: false)
            this.isShuffle = false;      // Random rejimi
            this.audio = new Audio();
            this.currentTime = 0;
            this._lastTrackIndex = -1;
            
            this.initEventListeners();
        }
        
        initEventListeners() {
            // Musiqa tugaganda
            this.audio.addEventListener('ended', () => {
                console.log('[Player] Musiqa tugadi');
                
                if (!this.isRepeat) {
                    // Takrorlash rejimi YO'Q => random keyingi musiqa
                    this.playNextRandom();
                } else {
                    // Takrorlash rejimi YOQILGAN => xuddi shu musiqani takrorla
                    this.playCurrentTrack();
                }
            });
            
            // Xatolik bo'lsa ham random keyingi musiqaga o'tish
            this.audio.addEventListener('error', (e) => {
                console.error('[Player] Musiqa xatosi:', e);
                this.playNextRandom();
            });
            
            // Vaqt yangilanganda
            this.audio.addEventListener('timeupdate', () => {
                if (this.onTimeUpdate) {
                    this.onTimeUpdate(this.audio.currentTime, this.audio.duration);
                }
            });
        }
        
        // Playlistni o'rnatish
        setPlaylist(songs) {
            if (!Array.isArray(songs)) return;
            this.playlist = songs;
            console.log(`[Player] Playlist yangilandi: ${this.playlist.length} ta musiqa`);
            if (this.onPlaylistUpdate) {
                this.onPlaylistUpdate(this.playlist);
            }
        }
        
        // Musiqa qo'shish
        addTrack(track) {
            if (!track || !track.url) return;
            this.playlist.push(track);
            console.log(`[Player] Yangi musiqa qo'shildi: ${track.title}`);
            if (this.onPlaylistUpdate) {
                this.onPlaylistUpdate(this.playlist);
            }
        }
        
        // Random keyingi musiqaga o'tish (asosiy funksiya)
        playNextRandom() {
            if (this.playlist.length === 0) {
                console.warn('[Player] Playlist bo\'sh');
                return;
            }
            
            let nextIndex;
            
            if (this.isShuffle) {
                // Random rejimi yoqilgan: butunlay random
                do {
                    nextIndex = Math.floor(Math.random() * this.playlist.length);
                } while (nextIndex === this.currentTrackIndex && this.playlist.length > 1);
            } else {
                // Random rejimi yo'q: hozirgi musiqadan boshqa random
                if (this.playlist.length === 1) {
                    nextIndex = 0;
                } else {
                    nextIndex = Math.floor(Math.random() * (this.playlist.length - 1));
                    if (nextIndex >= this.currentTrackIndex) nextIndex++;
                }
            }
            
            this.currentTrackIndex = nextIndex;
            this.playCurrentTrack();
            
            const track = this.playlist[this.currentTrackIndex];
            console.log(`[Player] Random keyingi musiqa: ${track?.title || 'Noma\'lum'}`);
        }
        
        // Keyingi musiqaga o'tish
        playNext() {
            if (this.playlist.length === 0) return;
            
            if (this.isShuffle) {
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * this.playlist.length);
                } while (nextIndex === this.currentTrackIndex && this.playlist.length > 1);
                this.currentTrackIndex = nextIndex;
            } else {
                this.currentTrackIndex = (this.currentTrackIndex + 1) % this.playlist.length;
            }
            
            this.playCurrentTrack();
        }
        
        // Oldingi musiqaga o'tish
        playPrevious() {
            if (this.playlist.length === 0) return;
            
            if (this.isShuffle) {
                let prevIndex;
                do {
                    prevIndex = Math.floor(Math.random() * this.playlist.length);
                } while (prevIndex === this.currentTrackIndex && this.playlist.length > 1);
                this.currentTrackIndex = prevIndex;
            } else {
                this.currentTrackIndex = (this.currentTrackIndex - 1 + this.playlist.length) % this.playlist.length;
            }
            
            this.playCurrentTrack();
        }
        
        // Hozirgi musiqani o'ynatish
        playCurrentTrack() {
            if (this.playlist.length === 0) {
                console.warn('[Player] Playlist bo\'sh');
                return;
            }
            
            const track = this.playlist[this.currentTrackIndex];
            if (!track || !track.url) {
                console.error('[Player] Musiqa URL topilmadi');
                this.playNextRandom();
                return;
            }
            
            this._lastTrackIndex = this.currentTrackIndex;
            this.audio.src = track.url;
            this.audio.load();
            
            if (this.currentTime > 0 && this.currentTrackIndex === this._lastTrackIndex) {
                this.audio.currentTime = this.currentTime;
            } else {
                this.currentTime = 0;
            }
            
            this.audio.play().catch(e => {
                console.error('[Player] Musiqa o\'ynatilmadi:', e);
            });
            
            this.isPlaying = true;
            
            if (this.onTrackChange) {
                this.onTrackChange(track, this.currentTrackIndex);
            }
            if (this.onPlayStateChange) {
                this.onPlayStateChange(true);
            }
            
            console.log(`[Player] ▶️ O'ynatilmoqda: ${track.title} - ${track.artist || 'Noma\'lum'}`);
        }
        
        // To'xtatish
        pause() {
            this.audio.pause();
            this.isPlaying = false;
            if (this.onPlayStateChange) {
                this.onPlayStateChange(false);
            }
        }
        
        // Davom ettirish
        play() {
            this.audio.play();
            this.isPlaying = true;
            if (this.onPlayStateChange) {
                this.onPlayStateChange(true);
            }
        }
        
        // Play/Pause
        togglePlay() {
            if (this.isPlaying) {
                this.pause();
            } else {
                this.play();
            }
        }
        
        // Ovoz balandligi (0-1)
        setVolume(volume) {
            const vol = Math.max(0, Math.min(1, volume));
            this.audio.volume = vol;
            if (this.onVolumeChange) {
                this.onVolumeChange(vol);
            }
        }
        
        // Vaqtni o'zgartirish
        seekTo(time) {
            if (time >= 0 && time <= this.audio.duration) {
                this.audio.currentTime = time;
                this.currentTime = time;
            }
        }
        
        // Takrorlash rejimini o'zgartirish
        toggleRepeat() {
            this.isRepeat = !this.isRepeat;
            console.log(`[Player] Takrorlash rejimi: ${this.isRepeat ? 'YOQILDI' : 'O\'CHIRILDI'}`);
            if (this.onRepeatChange) {
                this.onRepeatChange(this.isRepeat);
            }
            return this.isRepeat;
        }
        
        // Random rejimini o'zgartirish
        toggleShuffle() {
            this.isShuffle = !this.isShuffle;
            console.log(`[Player] Random rejimi: ${this.isShuffle ? 'YOQILDI' : 'O\'CHIRILDI'}`);
            if (this.onShuffleChange) {
                this.onShuffleChange(this.isShuffle);
            }
            return this.isShuffle;
        }
        
        // Hozirgi musiqani olish
        getCurrentTrack() {
            return this.playlist[this.currentTrackIndex] || null;
        }
        
        // Playlistni tozalash
        clearPlaylist() {
            this.playlist = [];
            this.currentTrackIndex = 0;
            this.audio.pause();
            this.audio.src = '';
            this.isPlaying = false;
            console.log('[Player] Playlist tozalandi');
            if (this.onPlaylistUpdate) {
                this.onPlaylistUpdate(this.playlist);
            }
        }
        
        // Callback funksiyalar
        onTrackChange(callback) { this.onTrackChange = callback; }
        onTimeUpdate(callback) { this.onTimeUpdate = callback; }
        onPlayStateChange(callback) { this.onPlayStateChange = callback; }
        onVolumeChange(callback) { this.onVolumeChange = callback; }
        onRepeatChange(callback) { this.onRepeatChange = callback; }
        onShuffleChange(callback) { this.onShuffleChange = callback; }
        onPlaylistUpdate(callback) { this.onPlaylistUpdate = callback; }
    }
    
    // ========== PLAYER OBYEKTINI YARATISH ==========
    const player = new MusicPlayer();
    
    // ========== MISOL: PLAYLIST (O'Z MUSIQALARINGIZ BILAN ALMASHTIRING) ==========
    const examplePlaylist = [
        { id: 1, title: "Musiqa 1", artist: "Artist 1", url: "https://example.com/music1.mp3", duration: 180 },
        { id: 2, title: "Musiqa 2", artist: "Artist 2", url: "https://example.com/music2.mp3", duration: 210 },
        { id: 3, title: "Musiqa 3", artist: "Artist 3", url: "https://example.com/music3.mp3", duration: 195 },
        { id: 4, title: "Musiqa 4", artist: "Artist 4", url: "https://example.com/music4.mp3", duration: 225 },
    ];
    
    // Playlistni o'rnatish
    player.setPlaylist(examplePlaylist);
    
    // ========== UI CALLBACKLAR (O'Z UI ELEMENTLARINGIZGA MOSLANG) ==========
    player.onTrackChange((track, index) => {
        console.log(`🎵 Endi: ${track.title} (${index + 1}/${player.playlist.length})`);
        // UI yangilash:
        // const titleEl = document.getElementById('current-song-title');
        // if (titleEl) titleEl.textContent = track.title;
        // const artistEl = document.getElementById('current-song-artist');
        // if (artistEl) artistEl.textContent = track.artist || '';
    });
    
    player.onTimeUpdate((currentTime, duration) => {
        const progressPercent = duration ? (currentTime / duration) * 100 : 0;
        // Progress barni yangilash:
        // const progressBar = document.getElementById('progress-bar-fill');
        // if (progressBar) progressBar.style.width = `${progressPercent}%`;
        // const currentTimeEl = document.getElementById('current-time');
        // if (currentTimeEl) currentTimeEl.textContent = formatTime(currentTime);
        // const durationEl = document.getElementById('duration');
        // if (durationEl) durationEl.textContent = formatTime(duration);
    });
    
    player.onPlayStateChange((isPlaying) => {
        console.log(`Player state: ${isPlaying ? '▶️ O\'ynatilmoqda' : '⏸ To\'xtatilgan'}`);
        // Play/Pause tugmasini yangilash:
        // const playBtn = document.getElementById('play-pause-btn');
        // if (playBtn) playBtn.innerHTML = isPlaying ? '⏸' : '▶';
    });
    
    player.onRepeatChange((isRepeat) => {
        console.log(`Repeat mode: ${isRepeat ? 'ON' : 'OFF'}`);
        // Repeat tugmasini yangilash:
        // const repeatBtn = document.getElementById('repeat-btn');
        // if (repeatBtn) repeatBtn.classList.toggle('active', isRepeat);
    });
    
    player.onShuffleChange((isShuffle) => {
        console.log(`Shuffle mode: ${isShuffle ? 'ON' : 'OFF'}`);
        // Shuffle tugmasini yangilash:
        // const shuffleBtn = document.getElementById('shuffle-btn');
        // if (shuffleBtn) shuffleBtn.classList.toggle('active', isShuffle);
    });
    
    // Vaqtni formatlash uchun yordamchi funksiya
    function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // ========== PLAYERNI GLOBAL QILISH (ixtiyoriy) ==========
    window.musicPlayer = player;
    window.formatTime = formatTime;
    
    // ========== TUGMALAR UCHUN EVENT LISTENERLAR (O'Z TUGMALARINGIZGA MOSLANG) ==========
    // Agar sahifangizda tugmalar mavjud bo'lsa, ularni shu yerda bog'lang:
    /*
    document.getElementById('play-pause-btn')?.addEventListener('click', () => player.togglePlay());
    document.getElementById('next-btn')?.addEventListener('click', () => player.playNext());
    document.getElementById('prev-btn')?.addEventListener('click', () => player.playPrevious());
    document.getElementById('repeat-btn')?.addEventListener('click', () => player.toggleRepeat());
    document.getElementById('shuffle-btn')?.addEventListener('click', () => player.toggleShuffle());
    document.getElementById('volume-slider')?.addEventListener('input', (e) => player.setVolume(e.target.value / 100));
    document.getElementById('progress-bar')?.addEventListener('click', (e) => {
        const progressBar = e.currentTarget;

        const duration = player.audio.duration;
        if (duration) player.seekTo(percent * duration);
    });
    */
    
    // Musiqani random boshlash (agar playlist bo'sh bo'lmasa)
    if (player.playlist.length > 0) {
        // Random boshlash uchun:
        const randomIndex = Math.floor(Math.random() * player.playlist.length);
        player.currentTrackIndex = randomIndex;
        // player.playCurrentTrack();  // Agar avtomatik o'ynasin desangiz
    }
    
    console.log('🎵 Music Player module loaded successfully!');
    console.log('💡 Asosiy xususiyat: Musiqa tugaganda random keyingi musiqaga o\'tish (agar takrorlash rejimi yoqilmagan bo\'lsa)');
