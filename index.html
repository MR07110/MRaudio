<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MR Audio | Professional Music Player</title>
    
    <style>
        :root {
            --spotify-green: #1DB954; 
            --ios-red: #ff3b30; 
            --bg: #ffffff;
            --text-main: #000000; 
            --text-sec: #8e8e93; 
            --wave-color: #1DB954;
            --bg-soft: #f2f2f7;
            --card-border: #f0f0f0;
            --nav-bg: rgba(255, 255, 255, 0.85);
        }

        body.dark-theme {
            --bg: #000000;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --bg-soft: #1c1c1e;
            --card-border: #2c2c2e;
            --nav-bg: rgba(28, 28, 30, 0.85);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
        }

        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-bottom: 120px; 
            color: var(--text-main); 
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px; 
        }

        .header-title { 
            font-size: 32px; 
            font-weight: 800; 
            margin-bottom: 25px; 
            letter-spacing: -1px; 
        }

        /* Audio Card Styles */
        .audio-card { 
            margin-bottom: 30px; 
            border-bottom: 1px solid var(--card-border); 
            padding-bottom: 20px; 
            animation: fadeIn 0.5s ease forwards;
        }

        .card-meta h4 { 
            margin: 0; font-size: 18px; font-weight: 700;
        }

        .card-meta p { 
            margin: 4px 0; color: var(--text-sec); font-size: 13px; 
        }

        /* Waveform */
        .waveform-visualizer { 
            width: 100%; height: 60px; display: flex; 
            align-items: center; justify-content: space-between; 
            gap: 2px; margin: 15px 0; 
        }

        .w-bar { 
            flex: 1; border-radius: 4px; height: 4px; 
            background: var(--bg-soft); transition: height 0.1s ease; 
        }
        .w-bar.active { background: var(--wave-color); }

        /* Progress Bar */
        .progress-box { 
            position: relative; width: 100%; height: 4px; 
            background: var(--bg-soft); border-radius: 2px; 
            margin-bottom: 20px; cursor: pointer; 
        }

        .progress-fill { 
            height: 100%; background: var(--spotify-green); 
            width: 0%; border-radius: 2px; position: relative; 
        }

        /* Controls */
        .controls { 
            display: flex; align-items: center; justify-content: space-around; 
        }

        .btn-svg { 
            background: none; border: none; cursor: pointer; 
            padding: 10px; display: flex; align-items: center; 
            transition: transform 0.2s; 
        }

        .btn-play { 
            width: 55px; height: 55px; border: 2px solid var(--text-main); 
            border-radius: 50%; justify-content: center; 
        }

        .svg-icon { width: 24px; height: 24px; fill: var(--text-main); }

        /* Studio & Record */
        .studio-box { text-align: center; padding: 20px 0; }
        .timer { font-size: 54px; font-weight: 300; margin: 10px 0; font-variant-numeric: tabular-nums; }
        
        .ios-input { 
            width: 100%; padding: 15px; background: var(--bg-soft); 
            border: none; border-radius: 12px; font-size: 16px; 
            margin-bottom: 20px; color: var(--text-main);
        }

        /* Navigation */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--nav-bg); backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); display: flex; 
            padding: 10px 0 30px; border-top: 1px solid var(--card-border); 
            z-index: 1000; 
        }

        .nav-item { flex: 1; text-align: center; border: none; background: none; color: var(--text-sec); font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--spotify-green); }
        .nav-item svg { display: block; margin: 0 auto 4px; fill: currentColor; width: 22px; height: 22px; }

        .page { display: none; }
        .page.active { display: block; }

        /* Loading & Progress */
        #up-txt { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: var(--spotify-green); color: white; 
            text-align: center; padding: 10px; font-size: 12px; 
            z-index: 2000; display: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="up-txt">Yuklanmoqda: <span id="up-p">0</span>%</div>

    <div class="container">
        
        <section id="page-explore" class="page active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 class="header-title" style="margin: 0;">MR AUDIO</h1>
                <button onclick="toggleTheme()" class="btn-svg" style="border: 1px solid var(--card-border); border-radius: 50%;">
                    <svg class="svg-icon" id="theme-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                </button>
            </div>
            <div id="audio-list"></div>
        </section>

        <section id="page-studio" class="page">
            <h1 class="header-title">Studio</h1>
            <div class="studio-box">
                <div id="studio-viz" class="waveform-visualizer" style="height: 100px; justify-content: center; gap: 4px;"></div>
                <div id="timer" class="timer">00:00</div>
                <input type="text" id="rec-name" class="ios-input" placeholder="Audio nomi...">
                
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button id="rec-trigger" class="btn-svg btn-play" style="margin: 0 auto; border-color: var(--ios-red);" onclick="handleRecord()">
                        <svg class="svg-icon" style="fill:var(--ios-red)" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
                    </button>
                    
                    <button id="save-cloud" class="ios-input" style="background:var(--spotify-green); color:white; font-weight:bold; display:none;" onclick="uploadAudio()">
                        Bulutga saqlash
                    </button>
                    
                    <button onclick="document.getElementById('file-in').click()" style="color:var(--spotify-green); background:none; border:none; font-weight:600;">
                        Fayl tanlash
                    </button>
                    <input type="file" id="file-in" hidden accept="audio/*" onchange="onFileSelect(this)">
                </div>
            </div>
        </section>

    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="switchPage(this, 'page-explore')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Explore</span>
        </button>
        <button class="nav-item" onclick="switchPage(this, 'page-studio')">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <span>Studio</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAoPSkghk-1Kff_f5ystj0qQYF2xSgSRk",
            authDomain: "bingo-9c6ee.firebaseapp.com",
            projectId: "bingo-9c6ee",
            storageBucket: "bingo-9c6ee.firebasestorage.app",
            messagingSenderId: "863175962665",
            appId: "1:863175962665:web:e3c9a8b628375ffc0c6c38"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mediaRecorder, chunks = [], activeBlob, timerInterval;
        let currentAudio = null, currentId = null;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Page Switcher
        window.switchPage = (btn, pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        };

        // Theme Toggle
        window.toggleTheme = () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.getElementById('theme-icon').innerHTML = isDark 
                ? '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1z"/>'
                : '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>';
        };

        // Load List
        async function loadAudios() {
            const q = query(collection(db, "audios"), orderBy("at", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('audio-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                list.appendChild(createCard(doc.id, data));
            });
        }
        loadAudios();

        function createCard(id, data) {
            const div = document.createElement('div');
            div.className = "audio-card";
            div.innerHTML = `
                <div class="card-meta">
                    <h4>${data.name}</h4>
                    <p>${data.size} • ${new Date(data.at?.toDate()).toLocaleTimeString()}</p>
                </div>
                <div class="waveform-visualizer" id="wf-${id}">${Array(40).fill('<div class="w-bar"></div>').join('')}</div>
                <div class="progress-box" onclick="seek(event, '${id}')">
                    <div class="progress-fill" id="pf-${id}"></div>
                </div>
                <div class="controls">
                    <button class="btn-svg btn-play" onclick="playAudio('${id}')" id="btn-${id}">
                        <svg class="svg-icon" id="ic-${id}" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                </div>
            `;
            return div;
        }

        window.playAudio = async (id) => {
            if (currentId === id && currentAudio) {
                if (currentAudio.paused) currentAudio.play();
                else currentAudio.pause();
                updateIcon(id);
                return;
            }

            if (currentAudio) { currentAudio.pause(); updateIcon(currentId, true); }

            currentId = id;
            const chunksSnap = await getDocs(query(collection(db, `audios/${id}/chunks`), orderBy("idx")));
            let b64 = "";
            chunksSnap.forEach(c => b64 += c.data().data);
            
            currentAudio = new Audio(b64);
            currentAudio.play();
            updateIcon(id);

            const bars = document.querySelectorAll(`#wf-${id} .w-bar`);
            currentAudio.ontimeupdate = () => {
                const p = (currentAudio.currentTime / currentAudio.duration) * 100;
                document.getElementById(`pf-${id}`).style.width = p + "%";
                
                // Simple Anim
                bars.forEach(b => {
                    if(Math.random() > 0.5) b.style.height = Math.random() * 40 + 5 + "px";
                    b.classList.add('active');
                });
            };
        };

        function updateIcon(id, reset = false) {
            const ic = document.getElementById(`ic-${id}`);
            if (!ic) return;
            if (reset || currentAudio.paused) ic.innerHTML = '<path d="M8 5v14l11-7z"/>';
            else ic.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        }

        // Recording Logic
        window.handleRecord = async () => {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    activeBlob = new Blob(chunks, { type: 'audio/webm' });
                    document.getElementById('save-cloud').style.display = 'block';
                };
                mediaRecorder.start();
                startTimer();
                document.getElementById('rec-trigger').style.transform = "scale(1.2)";
            } else {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                document.getElementById('rec-trigger').style.transform = "scale(1)";
            }
        };

        window.uploadAudio = async () => {
            const name = document.getElementById('rec-name').value || "Yozuv " + Date.now();
            const upTxt = document.getElementById('up-txt');
            upTxt.style.display = 'block';

            const reader = new FileReader();
            reader.readAsDataURL(activeBlob);
            reader.onloadend = async () => {
                const base64 = reader.result;
                const size = (activeBlob.size / 1024).toFixed(1) + " KB";
                
                const docRef = await addDoc(collection(db, "audios"), {
                    name, size, at: serverTimestamp()
                });

                const CHUNK_SIZE = 800 * 1024;
                const total = Math.ceil(base64.length / CHUNK_SIZE);

                for (let i = 0; i < total; i++) {
                    await addDoc(collection(db, `audios/${docRef.id}/chunks`), {
                        idx: i,
                        data: base64.substring(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE)
                    });
                    document.getElementById('up-p').innerText = Math.round(((i + 1) / total) * 100);
                }
                location.reload();
            };
        };

        window.onFileSelect = (el) => {
            if (el.files[0]) {
                activeBlob = el.files[0];
                document.getElementById('rec-name').value = el.files[0].name.split('.')[0];
                document.getElementById('save-cloud').style.display = 'block';
            }
        };

        function startTimer() {
            let s = 0;
            timerInterval = setInterval(() => {
                s++;
                let m = Math.floor(s / 60);
                document.getElementById('timer').innerText = `${String(m).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
