<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MRAI Audio Pro | Ultimate Sound Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1DB954;
            --primary-soft: rgba(29, 185, 84, 0.1);
            --danger: #ff3b30;
            --bg: #ffffff;
            --surface: #f2f2f7;
            --text-main: #1c1c1e;
            --text-sec: #8e8e93;
            --border: #e5e5ea;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.04);
            --glass: rgba(255, 255, 255, 0.8);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-theme {
            --bg: #000000;
            --surface: #1c1c1e;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --border: #2c2c2e;
            --glass: rgba(28, 28, 30, 0.8);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 120px;
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; color: var(--primary); }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* --- Search Bar --- */
        .search-container {
            margin-bottom: 25px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 16px;
            transition: var(--transition);
        }

        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }

        /* --- Audio Cards --- */
        .audio-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .audio-card:hover { transform: translateY(-4px); border-color: var(--primary); }

        .waveform-container {
            height: 60px;
            display: flex;
            align-items: center;
            gap: 2px;
            margin: 15px 0;
        }

        .bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            transition: height 0.15s ease;
        }

        .bar.active { background: var(--primary); }

        /* --- Custom Range Input (Slider) --- */
        .slider-container {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            position: relative;
            margin: 10px 0;
            cursor: pointer;
        }

        .slider-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 2px;
            pointer-events: none;
        }

        /* --- Controls --- */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .btn-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-play-main { background: var(--primary); color: white; width: 60px; height: 60px; }
        .btn-circle:active { transform: scale(0.9); }

        /* --- Studio Page --- */
        .studio-recorder {
            text-align: center;
            padding: 40px 20px;
            background: var(--surface);
            border-radius: 30px;
            margin-top: 20px;
        }

        .record-timer { font-size: 48px; font-weight: 800; margin: 20px 0; font-variant-numeric: tabular-nums; }

        .recording-visualizer {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 30px;
        }

        .rec-bar { width: 6px; background: var(--danger); border-radius: 3px; height: 10px; }

        /* --- Upload Overlay --- */
        #upload-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .progress-circle {
            width: 120px; height: 120px;
            border: 8px solid rgba(255,255,255,0.1);
            border-top: 8px solid var(--primary);
            border-radius: 50%;
            margin-bottom: 20px;
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--glass);
            backdrop-filter: blur(30px);
            padding: 15px 10px 30px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-sec);
            font-size: 12px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-link.active { color: var(--primary); }

        svg { width: 24px; height: 24px; fill: currentColor; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="upload-overlay">
        <div class="progress-circle" id="spinner"></div>
        <h2 id="up-status">Saqlanmoqda...</h2>
        <p id="up-percent">0%</p>
    </div>

    <header>
        <div class="logo">MRAI AUDIO</div>
        <button class="btn-circle" onclick="toggleTheme()">
            <svg id="theme-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
        </button>
    </header>

    <div class="container">
        <section id="page-explore" class="tab-content">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Musiqa yoki yozuvlarni qidirish..." oninput="filterAudios(this.value)">
            </div>
            <div id="audio-feed">
                </div>
        </section>

        <section id="page-studio" class="tab-content hidden">
            <div class="studio-recorder">
                <div class="recording-visualizer" id="studio-viz">
                    </div>
                <div class="record-timer" id="rec-timer">00:00</div>
                <input type="text" id="rec-title" class="search-input" style="margin-bottom: 20px; text-align: center;" placeholder="Yozuv nomi">
                
                <div style="display: flex; justify-content: center; gap: 20px;">
                    <button class="btn-circle btn-play-main" id="rec-btn" style="background: var(--danger);" onclick="toggleRecording()">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
                    </button>
                    <button class="btn-circle" onclick="document.getElementById('file-input').click()">
                        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                    </button>
                </div>
                <input type="file" id="file-input" class="hidden" accept="audio/*" onchange="handleFileUpload(this)">
                
                <button id="upload-btn" class="search-input" style="margin-top: 30px; background: var(--primary); color: white; border: none; display: none;" onclick="startCloudUpload()">
                    Bulutga yuklash
                </button>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active" onclick="switchTab(event, 'page-explore')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Explore</span>
        </a>
        <a href="#" class="nav-link" onclick="switchTab(event, 'page-studio')">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Studio</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase sozlamalari (Sizniki)
        const firebaseConfig = {
            apiKey: "AIzaSyDAoPSkghk-1Kff_f5ystj0qQYF2xSgSRk",
            authDomain: "bingo-9c6ee.firebaseapp.com",
            projectId: "bingo-9c6ee",
            storageBucket: "bingo-9c6ee.firebasestorage.app",
            messagingSenderId: "863175962665",
            appId: "1:863175962665:web:e3c9a8b628375ffc0c6c38"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- State Management ---
        let currentAudio = null;
        let currentId = null;
        let recorder = null;
        let chunks = [];
        let stream = null;
        let activeBlob = null;
        let timer = 0;
        let timerInterval = null;

        // --- Core Functions ---
        window.switchTab = (e, id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            e.currentTarget.classList.add('active');
        };

        window.toggleTheme = () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.getElementById('theme-icon').innerHTML = isDark ? 
                '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/>' : 
                '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>';
        };

        // --- Audio Logic ---
        async function fetchAudios() {
            const q = query(collection(db, "audios"), orderBy("at", "desc"));
            const snap = await getDocs(q);
            const container = document.getElementById('audio-feed');
            container.innerHTML = "";
            snap.forEach(doc => renderAudioCard(doc.id, doc.data()));
        }

        function renderAudioCard(id, data) {
            const feed = document.getElementById('audio-feed');
            const card = document.createElement('div');
            card.className = "audio-card";
            card.id = `card-${id}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <div>
                        <h3 style="margin:0">${data.name}</h3>
                        <small style="color:var(--text-sec)">${data.size} • ${new Date(data.at.seconds*1000).toLocaleDateString()}</small>
                    </div>
                </div>
                <div class="waveform-container" id="viz-${id}">
                    ${Array(40).fill('<div class="bar"></div>').join('')}
                </div>
                <div class="slider-container" onclick="seekAudio(event, '${id}')">
                    <div class="slider-fill" id="fill-${id}"></div>
                </div>
                <div class="controls">
                    <span id="time-${id}" style="font-size:12px; font-weight:600">00:00</span>
                    <button class="btn-circle btn-play-main" id="btn-${id}" onclick="playAudio('${id}')">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="btn-circle" onclick="shareAudio('${id}', '${data.name}')">
                        <svg viewBox="0 0 24 24"><path d="M18 16c-.7 0-1.4.3-1.9.8l-7.1-4.2c.1-.2.1-.5.1-.7s0-.5-.1-.7L16.1 7c.5.5 1.2.8 1.9.8 1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3c0 .2 0 .5.1.7L8 9.8C7.5 9.3 6.8 9 6 9c-1.7 0-3 1.3-3 3s1.3 3 3 3c.8 0 1.5-.3 2.1-.8l7.1 4.2c-.1.2-.1.4-.1.6 0 1.6 1.3 2.9 2.9 2.9s2.9-1.3 2.9-2.9-1.2-2.9-2.9-2.9z"/></svg>
                    </button>
                </div>
            `;
            feed.appendChild(card);
        }

        window.playAudio = async (id) => {
            if (currentId === id && currentAudio) {
                if (currentAudio.paused) { currentAudio.play(); updatePlayIcon(id, true); }
                else { currentAudio.pause(); updatePlayIcon(id, false); }
                return;
            }

            if (currentAudio) { currentAudio.pause(); }

            // Chunklarni yig'ish
            const chunksSnap = await getDocs(query(collection(db, `audios/${id}/chunks`), orderBy("idx")));
            let b64 = "";
            chunksSnap.forEach(c => b64 += c.data().data);
            
            currentAudio = new Audio(b64);
            currentId = id;
            currentAudio.play();
            updatePlayIcon(id, true);

            // Vizualizatsiya va taymer
            currentAudio.ontimeupdate = () => {
                const p = (currentAudio.currentTime / currentAudio.duration) * 100;
                document.getElementById(`fill-${id}`).style.width = p + "%";
                document.getElementById(`time-${id}`).innerText = formatTime(currentAudio.currentTime);
                animateViz(id);
            };
        };

        function animateViz(id) {
            const bars = document.querySelectorAll(`#viz-${id} .bar`);
            bars.forEach(bar => {
                const h = Math.random() * 40 + 5;
                bar.style.height = h + "px";
                bar.classList.add('active');
            });
        }

        function updatePlayIcon(id, isPlaying) {
            const btn = document.getElementById(`btn-${id}`);
            btn.innerHTML = isPlaying ? 
                '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>' : 
                '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        }

        // --- Recorder Logic ---
        window.toggleRecording = async () => {
            const btn = document.getElementById('rec-btn');
            if (!recorder || recorder.state === 'inactive') {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    activeBlob = new Blob(chunks, { type: 'audio/webm' });
                    document.getElementById('upload-btn').style.display = 'block';
                };
                recorder.start();
                startTimer();
                btn.style.background = "var(--text-main)";
                btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
            } else {
                recorder.stop();
                stopTimer();
                btn.style.background = "var(--danger)";
                btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>';
                stream.getTracks().forEach(t => t.stop());
            }
        };

        window.startCloudUpload = async () => {
            const name = document.getElementById('rec-title').value || "MRAI Audio";
            const overlay = document.getElementById('upload-overlay');
            overlay.style.display = 'flex';

            const reader = new FileReader();
            reader.readAsDataURL(activeBlob);
            reader.onloadend = async () => {
                const base64 = reader.result;
                const CHUNK_SIZE = 800 * 1024; // 800KB
                const totalChunks = Math.ceil(base64.length / CHUNK_SIZE);
                
                const mainDoc = await addDoc(collection(db, "audios"), {
                    name: name,
                    at: Timestamp.now(),
                    size: (activeBlob.size / 1024 / 1024).toFixed(2) + " MB"
                });

                for (let i = 0; i < totalChunks; i++) {
                    const chunk = base64.substring(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
                    await addDoc(collection(db, `audios/${mainDoc.id}/chunks`), {
                        idx: i,
                        data: chunk
                    });
                    const percent = Math.round(((i + 1) / totalChunks) * 100);
                    document.getElementById('up-percent').innerText = percent + "%";
                }
                location.reload();
            };
        };

        // --- Helper Tools ---
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            timer = 0;
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('rec-timer').innerText = formatTime(timer);
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }

        window.shareAudio = (id, name) => {
            const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
            if (navigator.share) {
                navigator.share({ title: 'MRAI Audio', text: name, url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert("Havola nusxalandi!");
            }
        };

        // Init
        fetchAudios();
    </script>
</body>
</html>
